services:
  jenkins:
    build:
      context: ..
      dockerfile: jenkins/Dockerfile
    container_name: jenkins
    ports:
      - "8081:8080"
      - "50001:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ${USERPROFILE}\\.kube:/var/jenkins_home/.kube
      - ../:/workspace
    restart: unless-stopped

volumes:
  jenkins_home:
