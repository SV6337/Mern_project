services:
  - type: web
    name: mern-2-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci && npm --prefix frontend ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_FRONTEND
        value: "false"
      - key: MONGODB_URI
        sync: false
