services:
  - type: web
    name: mern-2-api
    runtime: docker
    plan: free
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_FRONTEND
        value: "false"
      - key: MONGODB_URI
        sync: false
